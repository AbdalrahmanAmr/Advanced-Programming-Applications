<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>Patient Appointments</div>
        <div><a th:href="@{/doctor/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
    </div>
    
    <div class="container">
        <h1>Upcoming Appointments</h1>
        
        <div class="no-appointments" th:if="${appointments.isEmpty()}">
            <p>No appointments scheduled.</p>
        </div>
        
        <div class="table-wrapper">
            <table th:if="${!appointments.isEmpty()}">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.patient.firstName + ' ' + appt.patient.lastName}"></td>
                        <td th:text="${#temporals.format(appt.appointmentTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${appt.status}"></td>
                        <td>
                            <div th:if="${appt.status.name() == 'PENDING'}" style="display: flex; gap: 10px;">
                                <form method="post" th:action="@{/doctor/appointments/{id}/status(id=${appt.appointmentId})}" style="display: inline;">
                                    <input type="hidden" name="status" value="CONFIRMED">
                                    <button type="submit" class="btn btn-success">Confirm</button>
                                </form>
                                <form method="post" th:action="@{/doctor/appointments/{id}/status(id=${appt.appointmentId})}" style="display: inline;">
                                    <input type="hidden" name="status" value="CANCELLED">
                                    <button type="submit" class="btn btn-danger">Cancel</button>
                                </form>
                            </div>
                            <div th:if="${appt.status.name() != 'PENDING'}">
                                <a th:href="@{/doctor/reports/write/{id}(id=${appt.appointmentId})}" class="btn">Write Report</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
