<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>
            <span th:text="'Welcome, Dr. ' + ${doctor.lastName}"></span>
        </div>
        <div>
            <a th:href="@{/doctor/profile}">My Profile</a>
            <a th:href="@{/auth/logout}">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <h1>Doctor Dashboard</h1>
        
        <div class="welcome-section">
            <p>Welcome back, <strong th:text="'Dr. ' + ${doctor.lastName}"></strong>! Here you can manage your schedule, view patient appointments, and write reports.</p>
        </div>
        
        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">Email</div>
                <div class="info-value" th:text="${doctor.email}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Phone</div>
                <div class="info-value" th:text="${doctor.phone}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Age</div>
                <div class="info-value" th:text="${doctor.age}"></div>
            </div>
        </div>
        
        <h2>Quick Actions</h2>
        <div class="actions">
            <a th:href="@{/doctor/appointments}" class="action-btn">My Appointments</a>
            <a th:href="@{/doctor/slots/manage}" class="action-btn">Manage Slots</a>
            <a th:href="@{/doctor/reports}" class="action-btn">My Reports</a>
            <a th:href="@{/doctor/profile}" class="action-btn">Edit Profile</a>
        </div>
    </div>
</body>
</html>
