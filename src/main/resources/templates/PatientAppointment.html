<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>My Appointments</div>
        <div><a th:href="@{/patient/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
    </div>
    
    <div class="container">
        <h1>Your Appointments</h1>
        
        <div class="no-appointments" th:if="${appointments.isEmpty()}">
            <p>No appointments booked yet.</p>
            <a th:href="@{/patient/appointment/book}" class="btn">Book Now</a>
        </div>
        
        <div class="table-wrapper">
            <table th:if="${!appointments.isEmpty()}">
                <thead>
                    <tr>
                        <th>Doctor</th>
                        <th>Day</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.doctor.firstName + ' ' + appt.doctor.lastName}"></td>
                        <td th:text="${appt.weekday}"></td>
                        <td th:text="${appt.appointmenttime}"></td>
                        <td th:text="${appt.status}"></td>
                        <td>
                            <form method="post" th:action="@{/patient/appointments/{id}/cancel(id=${appt.appointmentId})}" class="inline-form">
                                <button type="submit" class="btn btn-red" onclick="return confirm('Cancel this appointment?')">Cancel</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
