<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>
            <span th:text="'Welcome, ' + ${patient.firstName}"></span>
        </div>
        <div>
            <a th:href="@{/patient/profile}">My Profile</a>
            <a th:href="@{/auth/logout}">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <h1>Patient Dashboard</h1>
        
        <div class="welcome-section">
            <p>Welcome back, <strong th:text="${patient.firstName}"></strong>! Here you can manage your appointments and view your medical information.</p>
        </div>
        
        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">Email</div>
                <div class="info-value" th:text="${patient.email}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Phone</div>
                <div class="info-value" th:text="${patient.phone}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Age</div>
                <div class="info-value" th:text="${patient.age}"></div>
            </div>
        </div>
        
        <h2>Quick Actions</h2>
        <div class="actions">
            <a th:href="@{/patient/appointment/book}" class="action-btn">Book Appointment</a>
            <a th:href="@{/patient/appointments}" class="action-btn">My Appointments</a>
            <a th:href="@{/patient/profile}" class="action-btn">Edit Profile</a>
        </div>
    </div>
</body>
</html>
