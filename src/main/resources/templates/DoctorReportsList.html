<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>My Reports</div>
        <div><a th:href="@{/doctor/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
    </div>
    
    <div class="container">
        <h1>Medical Reports</h1>
        
        <div class="no-reports" th:if="${reports.isEmpty()}">
            <p>No reports written yet.</p>
        </div>
        
        <div class="table-wrapper">
            <table th:if="${!reports.isEmpty()}">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="report : ${reports}">
                        <td th:text="${report.appointment.patient.firstName + ' ' + report.appointment.patient.lastName}"></td>
                        <td th:text="${#strings.abbreviate(report.notes, 50)}"></td>
                        <td><a th:href="@{/doctor/reports/view/{id}(id=${report.reportId})}" class="btn">View</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
