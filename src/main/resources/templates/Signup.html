<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;">
    <div class="container medium">
        <h1 class="center">Sign Up</h1>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <div class="form-group">
            <label>Account Type:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="role" value="PATIENT" id="rolePatient" checked onclick="toggleRole()"> Patient
                </label>
                <label>
                    <input type="radio" name="role" value="DOCTOR" id="roleDoctor" onclick="toggleRole()"> Doctor
                </label>
            </div>
        </div>

        <!-- Registration Form -->
        <form method="post" th:action="@{/auth/register}" th:object="${registrationDto}">
            <input type="hidden" id="roleInput" name="role" value="PATIENT">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" minlength="2" maxlength="50" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" minlength="2" maxlength="50" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" minlength="3" maxlength="50" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" minlength="6" maxlength="100" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" min="1" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="text" id="phone" name="phone" pattern="^\+?[0-9]{7,15}$" title="Must be 7-15 digits, optionally starting with +" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="true" required> Male
                    </label>
                    <label>
                        <input type="radio" name="gender" value="false" required> Female
                    </label>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">Sign Up as Patient</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a th:href="@{/auth/login}">Login</a>
        </div>
    </div>

    <script>
        function toggleRole() {
            var isDoctor = document.getElementById('roleDoctor').checked;
            var roleInput = document.getElementById('roleInput');
            var submitBtn = document.getElementById('submitBtn');
            
            if (isDoctor) {
                roleInput.value = 'DOCTOR';
                submitBtn.innerText = 'Sign Up as Doctor';
            } else {
                roleInput.value = 'PATIENT';
                submitBtn.innerText = 'Sign Up as Patient';
            }
        }
    </script>
</body>
</html>
