<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;">
    <div class="container medium">
        <h1 class="center">Sign Up</h1>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <div class="form-group">
            <label>Account Type:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="role" value="PATIENT" id="rolePatient" checked onclick="toggleRole()"> Patient
                </label>
                <label>
                    <input type="radio" name="role" value="DOCTOR" id="roleDoctor" onclick="toggleRole()"> Doctor
                </label>
            </div>
        </div>

        <!-- Patient Registration Form -->
        <form method="post" th:action="@{/auth/register/patient}" id="patientForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="patFirstName">First Name:</label>
                    <input type="text" id="patFirstName" name="firstName" minlength = "3" maxlength = "50" required>
                </div>
                <div class="form-group">
                    <label for="patLastName">Last Name:</label>
                    <input type="text" id="patLastName" name="lastName" minlength = "3" maxlength = "50" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="patientUsername">Username:</label>
                <input type="text" id="patientUsername" name="patientUsername" minlength = "3" maxlength = "50" required>
            </div>
            
            <div class="form-group">
                <label for="patEmail">Email:</label>
                <input type="email" id="patEmail" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="patPassword">Password:</label>
                <input type="password" id="patPassword" name="password" minlength = "6" maxlength = "100" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="patAge">Age:</label>
                    <input type="number" id="patAge" name="age" min="18" required>
                </div>
                <div class="form-group">
                    <label for="patPhone">Phone:</label>
                    <input type="text" id="patPhone" name="phone" pattern="^\+?[0-9]{7,15}$" title="Must be 7-15 digits, optionally starting with +" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="true" required> Male
                    </label>
                    <label>
                        <input type="radio" name="gender" value="false" required> Female
                    </label>
                </div>
            </div>
            
            <button type="submit">Sign Up as Patient</button>
        </form>

        <!-- DoctorController Registration Form -->
        <form method="post" th:action="@{/auth/register/doctor}" id="doctorForm" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="docFirstName">First Name:</label>
                    <input type="text" id="docFirstName" name="firstName">
                </div>
                <div class="form-group">
                    <label for="docLastName">Last Name:</label>
                    <input type="text" id="docLastName" name="lastName">
                </div>
            </div>
            
            <div class="form-group">
                <label for="doctorUsername">Username:</label>
                <input type="text" id="doctorUsername" name="doctorUsername" minlength = "3" maxlength = "50" >
            </div>
            
            <div class="form-group">
                <label for="docEmail">Email:</label>
                <input type="email" id="docEmail" name="email">
            </div>
            
            <div class="form-group">
                <label for="docPassword">Password:</label>
                <input type="password" id="docPassword" name="password" minlength="6" maxlength = "100" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="docAge">Age:</label>
                    <input type="number" id="docAge" name="age" min="18" max = "120">
                </div>
                <div class="form-group">
                    <label for="docPhone">Phone:</label>
                    <input type="text" id="docPhone" name="phone" minlength = "7" maxlength = "15" pattern="^\+?[0-9]{7,15}$" title="Must be 7-15 digits, optionally starting with +" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="true"> Male
                    </label>
                    <label>
                        <input type="radio" name="gender" value="false"> Female
                    </label>
                </div>
            </div>
            
            <button type="submit">Sign Up as Doctor</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a th:href="@{/auth/login}">Login</a>
        </div>
    </div>

    <script>
        function toggleRole() {
            var isDoctor = document.getElementById('roleDoctor').checked;
            var patientForm = document.getElementById('patientForm');
            var doctorForm = document.getElementById('doctorForm');
            
            if (isDoctor) {
                patientForm.style.display = 'none';
                doctorForm.style.display = 'block';
                // Toggle required attributes
                patientForm.querySelectorAll('input').forEach(function(input) { input.removeAttribute('required'); });
                doctorForm.querySelectorAll('input[type="text"], input[type="email"], input[type="password"], input[type="number"]').forEach(function(input) { input.setAttribute('required', ''); });
            } else {
                patientForm.style.display = 'block';
                doctorForm.style.display = 'none';
                patientForm.querySelectorAll('input[type="text"], input[type="email"], input[type="password"], input[type="number"]').forEach(function(input) { input.setAttribute('required', ''); });
                doctorForm.querySelectorAll('input').forEach(function(input) { input.removeAttribute('required'); });
            }
        }
    </script>
</body>
</html>
