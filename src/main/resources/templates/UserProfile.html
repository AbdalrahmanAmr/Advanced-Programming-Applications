<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="navbar">
    <div>
        <span th:text="'Welcome, ' + ${person.firstName}"></span>
    </div>
    <div>
        <a th:if="${person.role == 'DOCTOR'}" th:href="@{/doctor/dashboard}">Dashboard</a>
        <a th:if="${person.role == 'PATIENT'}" th:href="@{/patient/dashboard}">Dashboard</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</div>

<div class="container medium">
    <h1 class="center">My Profile</h1>

    <div class="profile-picture-container" th:if="${person.profilePicture != null}" style="text-align: center; margin-bottom: 20px;">
        <img th:src="@{'/files/profile-picture/' + ${person.personId}}" alt="Profile Picture" style="max-width: 150px; border-radius: 50%;">
    </div>

    <div class="profile-info">
        <div class="info-row">
            <div class="info-field">
                <div class="info-label">Username</div>
                <div class="info-value" th:text="${person.username}"></div>
            </div>
            <div class="info-field">
                <div class="info-label">Account Type</div>
                <div class="info-value" th:text="${person.role}"></div>
            </div>
        </div>

        <div class="info-row">
            <div class="info-field">
                <div class="info-label">Email</div>
                <div class="info-value" th:text="${person.email}"></div>
            </div>
            <div class="info-field">
                <div class="info-label">Phone</div>
                <div class="info-value" th:text="${person.phone}"></div>
            </div>
        </div>

        <div class="info-row">
            <div class="info-field">
                <div class="info-label">Age</div>
                <div class="info-value" th:text="${person.age}"></div>
            </div>
            <div class="info-field">
                <div class="info-label">Gender</div>
                <div class="info-value" th:text="${person.gender ? 'Male' : 'Female'}"></div>
            </div>
        </div>

        <div th:if="${person.role == 'DOCTOR'}">
            <div class="info-row" th:if="${person.summary != null and !person.summary.isEmpty()}">
                <div class="info-field" style="flex: 100%;">
                    <div class="info-label">Summary</div>
                    <div class="info-value" th:text="${person.summary}"></div>
                </div>
            </div>

            <div class="info-row" th:if="${person.certificates != null and !person.certificates.isEmpty()}">
                <div class="info-field" style="flex: 100%;">
                    <div class="info-label">Certificates</div>
                    <div class="info-value">
                        <ul>
                            <li th:each="cert, iterStat : ${person.certificates}">
                                <a th:href="@{'/files/certificate/' + ${person.personId} + '/' + ${iterStat.index}}" th:text="${cert.fileName}"></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h2>Edit Profile</h2>
    <form method="post" th:action="${person.role == 'DOCTOR'} ? @{/doctor/profile} : @{/patient/profile}" enctype="multipart/form-data">
        <input type="hidden" name="username" th:value="${person.username}">
        <input type="hidden" name="password" th:value="${person.password}">
        <div class="form-group">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" th:value="${person.firstName}" minlength = "3" maxlength = "50" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" th:value="${person.lastName}" minlength = "3" maxlength = "50" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" th:value="${person.email}" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" th:value="${person.phone}" minlength = "7" maxlength = "15" pattern="^\+?[0-9]{7,15}$" title="Must be 7-15 digits, optionally starting with +" required>
        </div>

        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" th:value="${person.age}" min="18" max = "120" required>
        </div>

        <div class="form-group">
            <label for="profilePictureFile">Profile Picture:</label>
            <input type="file" id="profilePictureFile" name="profilePictureFile" accept="image/*">
        </div>

        <div th:if="${person.role == 'DOCTOR'}">
            <div class="form-group">
                <label for="summary">Summary:</label>
                <textarea id="summary" name="summary" rows="4" style="width: 100%;" th:text="${person.summary}"></textarea>
            </div>

            <div class="form-group">
                <label for="certificateFiles">Certificates (You can select multiple files):</label>
                <input type="file" id="certificateFiles" name="certificateFiles" multiple accept="application/pdf,image/*">
            </div>
        </div>

        <div class="button-group-form">
            <button type="submit">Save Changes</button>
            <a th:if="${person.role == 'DOCTOR'}" th:href="@{/doctor/dashboard}" class="cancel-btn">Cancel</a>
            <a th:if="${person.role == 'PATIENT'}" th:href="@{/patient/dashboard}" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
