<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .navbar {
            background: #333;
            color: white;
            padding: 15px 20px;
            margin-bottom: 30px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .profile-info {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .info-field {
            margin-bottom: 10px;
        }
        .info-label {
            font-weight: bold;
            color: #555;
            font-size: 12px;
            text-transform: uppercase;
        }
        .info-value {
            color: #333;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .cancel-btn {
            background: #999;
        }
        .cancel-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>
            <span th:text="'Welcome, ' + ${user.firstName}"></span>
        </div>
        <div>
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/user/logout}">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <h1>My Profile</h1>
        
        <div class="profile-info">
            <div class="info-row">
                <div class="info-field">
                    <div class="info-label">Username</div>
                    <div class="info-value" th:text="${user.username}"></div>
                </div>
                <div class="info-field">
                    <div class="info-label">Account Type</div>
                    <div class="info-value" th:text="${user.isDoctor() ? 'Doctor' : 'Patient'}"></div>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-field">
                    <div class="info-label">Email</div>
                    <div class="info-value" th:text="${user.email}"></div>
                </div>
                <div class="info-field">
                    <div class="info-label">Phone</div>
                    <div class="info-value" th:text="${user.phone}"></div>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-field">
                    <div class="info-label">Age</div>
                    <div class="info-value" th:text="${user.age}"></div>
                </div>
                <div class="info-field">
                    <div class="info-label">Gender</div>
                    <div class="info-value" th:text="${user.isGender() ? 'Male' : 'Female'}"></div>
                </div>
            </div>
        </div>
        
        <h2>Edit Profile</h2>
        <form method="post" th:action="@{/user/profile/{id}(id=${user.userId})}">
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" th:value="${user.firstName}" required>
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" th:value="${user.lastName}" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" th:value="${user.email}" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone" th:value="${user.phone}" required>
            </div>
            
            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" th:value="${user.age}" min="18" required>
            </div>
            
            <div class="button-group">
                <button type="submit">Save Changes</button>
                <a th:href="@{/dashboard}" class="cancel-btn" style="display: flex; align-items: center; justify-content: center; text-decoration: none; color: white;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
