<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report View</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>Medical Report</div>
        <div><a th:href="@{/doctor/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
    </div>
    
    <div class="container medium">
        <h1>Medical Report</h1>

        <div class="report-section">
            <div class="report-label">Patient:</div>
            <div class="report-value" th:text="${report.appointment.patient.firstName + ' ' + report.appointment.patient.lastName}"></div>

            <div class="report-label">Doctor:</div>
            <div class="report-value" th:text="${report.doctor.firstName + ' ' + report.doctor.lastName}"></div>

            <div class="report-label">Notes:</div>
            <div class="report-value" th:text="${report.notes}"></div>
        </div>
        
        <a th:href="@{/doctor/dashboard}" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
