<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Report</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="navbar">
    <div>Write Medical Report</div>
    <div><a th:href="@{/doctor/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
</div>

<div class="container medium">
    <h1>Write Report for <span th:text="${appointment.patient.firstName + ' ' + appointment.patient.lastName}"></span></h1>

    <div th:if="${alreadyWritten}" class="alert alert-warning">
        <p th:text="${message}"></p>
        <a th:href="@{/doctor/dashboard}" class="btn">Back to Dashboard</a>
    </div>

    <div th:if="${!alreadyWritten}">
        <form method="post" th:action="@{/doctor/reports/write}" th:object="${report}">
            <input type="hidden" name="appointmentId" th:value="${appointment.appointmentId}">

            <div class="form-group">
                <label for="notes">Medical Notes:</label>
                <textarea id="notes" name="notes" th:field="*{notes}" required></textarea>
            </div>

            <button type="submit">Save Report</button>
            <a th:href="@{/doctor/dashboard}" class="cancel-btn">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
