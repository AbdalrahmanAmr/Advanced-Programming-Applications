<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>Book Appointment</div>
        <div><a th:href="@{/patient/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
    </div>
    
    <div class="container medium">
        <h1>Book an Appointment</h1>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        
        <form method="post" th:action="@{/patient/appointments/book}">
            <div class="form-group">
                <label for="doctorId">Select Doctor:</label>
                <select id="doctorId" name="doctorId" required>
                    <option value="">-- Choose a doctor --</option>
                    <option th:each="doctor : ${doctors}" th:value="${doctor.personId}" th:text="${doctor.firstName + ' ' + doctor.lastName}"></option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="weekday">Day of Week:</label>
                <select id="weekday" name="weekday" required>
                    <option value="">-- Select a day --</option>
                    <option th:each="day : ${weekdays}" th:value="${day}" th:text="${day}"></option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="appointmentTime">Appointment Time:</label>
                <input type="time" id="appointmentTime" name="appointmentTime" required>
            </div>
            
            <button type="submit">Book Appointment</button>
        </form>
    </div>
</body>
</html>
