<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="navbar">
        <div>Book Appointment</div>
        <div><a th:href="@{/patient/dashboard}">Dashboard</a> <a th:href="@{/auth/logout}">Logout</a></div>
    </div>
    
    <div class="container medium">
        <h1>Book an Appointment</h1>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        
        <form method="post" th:action="@{/patient/appointment/book}" th:object="${appointmentDto}">
            <div class="form-group">
                <label for="doctorId">Select Doctor:</label>
                <select id="doctorId" name="doctorId" th:field="*{doctorId}" required>
                    <option value="">-- Choose a doctor --</option>
                    <option th:each="doctor : ${doctors}" th:value="${doctor.personId}" th:text="${doctor.firstName + ' ' + doctor.lastName}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}"></div>
            </div>
            
            <div class="form-group">
                <label for="appointmentTime">Appointment Date and Time:</label>
                <input type="datetime-local" id="appointmentTime" name="appointmentTime" th:field="*{appointmentTime}" required>
                <div class="error" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
            </div>
            
            <button type="submit">Book Appointment</button>
        </form>
    </div>
</body>
</html>
